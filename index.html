<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/styles/styles.css">
    <title>Calculadora</title>
</head>

<body>
    <main>
        <div id="calculadora">
            <div id="tela-calculadora">
                <div id="numero-tela">
                    <p>0</p>
                </div>
            </div>

            <div id="tela-numeros">
                <!--BOTÕES DE 1 AO 9-->
                <button class="botoes numeros">7</button>
                <button class="botoes numeros">8</button>
                <button class="botoes numeros">9</button>
                <button class="botoes numeros">4</button>
                <button class="botoes numeros">5</button>
                <button class="botoes numeros">6</button>
                <button class="botoes numeros">1</button>
                <button class="botoes numeros">2</button>
                <button class="botoes numeros">3</button>

                <!--BOTÃO 0 (SEPARADO POR SER MAIOR QUE OS OUTROS)-->
                <button id="zero">0</button>

                <div id="tela-operacoes">
                    <!--BOTÕES DE OPERAÇÕES-->
                    <button class="botoes operacoes"><i class="fa-solid fa-delete-left"></i></button>
                    <button class="botoes operacoes"><i class="fa-solid fa-divide"></i></button>
                    <button class="botoes operacoes"><i class="fa-solid fa-xmark"></i></button>
                    <button class="botoes operacoes"><i class="fa-solid fa-minus"></i></button>
                    <button class="botoes operacoes"><i class="fa-solid fa-plus"></i></button>
                    <button class="botoes operacoes"><i class="fa-solid fa-equals"></i></button>
                </div>
            </div>
        </div>
    </main>
    <script src="src/javascript/script.js"></script>
</body>

</html>
