<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/styles/styles.css">
    <title>Calculadora</title>
</head>

<body>
    <main>
        <div id="calculadora">
            <input type="text" id="visor" disabled>

            <div id="tela-numeros">
                <!--BOTÕES DE 1 AO 9-->
                <button class="botoes numeros" data-valor="7">7</button>
                <button class="botoes numeros" data-valor="8">8</button>
                <button class="botoes numeros" data-valor="9">9</button>
                <button class="botoes numeros" data-valor="4">4</button>
                <button class="botoes numeros" data-valor="5">5</button>
                <button class="botoes numeros" data-valor="6">6</button>
                <button class="botoes numeros" data-valor="1">1</button>
                <button class="botoes numeros" data-valor="2">2</button>
                <button class="botoes numeros" data-valor="3">3</button>

                <!--BOTÃO 0 (SEPARADO POR SER MAIOR QUE OS OUTROS)-->
                <button class="botoes" id="zero" data-valor="0">0</button>

                <div id="tela-operacoes">
                    <!--BOTÕES DE OPERAÇÕES-->
                    <button class="botoes operacoes" id="apagar" data-acao="limpar"><i class="fa-solid fa-delete-left"></i></button>
                    <button class="botoes operacoes" data-valor="/"><i class="fa-solid fa-divide"></i></button>
                    <button class="botoes operacoes" data-valor="*"><i class="fa-solid fa-xmark"></i></button>
                    <button class="botoes operacoes" data-valor="-"><i class="fa-solid fa-minus"></i></button>
                    <button class="botoes operacoes" data-valor="+"><i class="fa-solid fa-plus"></i></button>
                    <button class="botoes operacoes" id="igual" data-acao="calcular"><i class="fa-solid fa-equals"></i></button>
                </div>
            </div>
        </div>
    </main>
    <script src="src/javascript/script.js"></script>
</body>

</html>
